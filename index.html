<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Question Answering</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
    .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .section-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .upload-area { border: 1.5px dashed #ccc; border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; transition: background 0.15s; }
    .upload-area:hover { background: #f9f9f9; }
    .upload-text { font-size: 13px; color: #666; }
    .upload-text span { color: #2563eb; cursor: pointer; }
    #file-input { display: none; }
    .file-status { display: none; align-items: center; gap: 8px; padding: 8px 12px; background: #f0fdf4; border-radius: 8px; margin-top: 10px; }
    .file-status.show { display: flex; }
    .file-status span { font-size: 13px; color: #16a34a; }
    .upload-btn { width: 100%; margin-top: 10px; padding: 9px; font-size: 13px; font-weight: 500; background: #fff; border: 1px solid #d0d0d0; border-radius: 8px; cursor: pointer; color: #111; transition: background 0.15s; }
    .upload-btn:hover { background: #f5f5f5; }
    .upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .chat-area { min-height: 200px; max-height: 360px; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
    .message { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .message.user { align-self: flex-end; background: #dbeafe; color: #1e3a8a; border-bottom-right-radius: 3px; }
    .message.assistant { align-self: flex-start; background: #f3f4f6; color: #111; border-bottom-left-radius: 3px; }
    .message.loading { opacity: 0.6; font-style: italic; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row textarea { flex: 1; resize: none; font-size: 14px; padding: 10px 12px; border-radius: 8px; border: 1px solid #d0d0d0; background: #fff; color: #111; font-family: inherit; min-height: 42px; max-height: 100px; outline: none; }
    .input-row textarea:focus { border-color: #999; }
    .send-btn { padding: 10px 18px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 1px solid #d0d0d0; background: #fff; color: #111; cursor: pointer; transition: background 0.15s; }
    .send-btn:hover { background: #f5f5f5; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .empty-state { text-align: center; padding: 2rem 0; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PDF question answering</h1>
    <p class="subtitle">Upload a PDF and ask questions about its content</p>

    <div class="card">
      <div class="section-label">1. Upload PDF</div>
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <p class="upload-text">Drop your PDF here or <span>browse</span></p>
        <input type="file" id="file-input" accept=".pdf" onchange="handleFileSelect(this)">
      </div>
      <div class="file-status" id="file-status">
        <span id="file-name">file.pdf selected</span>
      </div>
      <button class="upload-btn" id="upload-btn" onclick="uploadFile()" disabled>Upload PDF</button>
    </div>

    <div class="card">
      <div class="section-label">2. Ask a question</div>
      <div class="chat-area" id="chat-area">
        <div class="empty-state" id="empty-state">Upload a PDF to start asking questions</div>
      </div>
      <div class="input-row">
        <textarea id="question-input" placeholder="Ask something about your PDF..." rows="1" disabled
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuestion()}"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendQuestion()" disabled>Ask</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:8000';
    let selectedFile = null;
    let pdfUploaded = false;

    function handleFileSelect(input) {
      selectedFile = input.files[0];
      if (selectedFile) {
        document.getElementById('file-name').textContent = selectedFile.name + ' selected';
        document.getElementById('file-status').classList.add('show');
        document.getElementById('upload-btn').disabled = false;
      }
    }

    async function uploadFile() {
      if (!selectedFile) return;
      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.textContent = 'Uploading...';
      try {
        const formData = new FormData();
        formData.append('file', selectedFile);
        const res = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
        const data = await res.json();
        if (res.ok) {
          btn.textContent = 'Uploaded successfully';
          pdfUploaded = true;
          document.getElementById('question-input').disabled = false;
          document.getElementById('send-btn').disabled = false;
          document.getElementById('empty-state').textContent = 'PDF ready. Ask your first question below.';
        } else {
          btn.textContent = 'Upload failed';
          btn.disabled = false;
        }
      } catch (e) {
        btn.textContent = 'Error — is API running?';
        btn.disabled = false;
      }
    }

    async function sendQuestion() {
      const input = document.getElementById('question-input');
      const question = input.value.trim();
      if (!question || !pdfUploaded) return;

      addMessage(question, 'user');
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('send-btn').disabled = true;

      const loadingEl = addMessage('Thinking...', 'assistant loading');

      try {
        const res = await fetch(`${API_URL}/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        loadingEl.remove();
        addMessage(res.ok ? data.answer : (data.detail || 'Something went wrong.'), 'assistant');
      } catch (e) {
        loadingEl.remove();
        addMessage('Could not reach the API. Make sure it is running on localhost:8000.', 'assistant');
      }

      document.getElementById('send-btn').disabled = false;
    }

    function addMessage(text, type) {
      const chatArea = document.getElementById('chat-area');
      const emptyState = document.getElementById('empty-state');
      if (emptyState && type === 'user') emptyState.remove();
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
      return msg;
    }
  </script>
</body>
</html>
